<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<title>BOOTH 4 CUTS - FRAME ARCHIVE</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700&family=Pretendard:wght@400;600;800&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0a0a0a;
  --card: #151515;
  --accent: #ff007a;
  --text: #ffffff;
  --text-dim: #888888;
  --border: #222222;
  --sh: 0 0 20px rgba(255, 0, 122, 0.2);
}

* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
body { font-family: 'Pretendard', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; overflow-x: hidden; }
.app { position:relative; z-index:1; max-width:500px; margin:0 auto; padding:20px 16px 100px; }

/* Header & Steps */
.hd { display:flex; justify-content:space-between; align-items:center; padding:10px 0 30px; }
.logo { font-family: 'Orbitron', sans-serif; font-size: 1.4rem; letter-spacing: 2px; color: var(--accent); text-shadow: var(--sh); cursor:pointer; }
.hd-album { background: transparent; border: 1px solid var(--border); color: var(--text); padding: 8px 16px; border-radius: 4px; font-size: 0.8rem; cursor: pointer; }
.steps { display:flex; gap:8px; margin-bottom:24px; }
.si { flex:1; height:4px; background:var(--border); border-radius:2px; transition: 0.3s; }
.si.on { background: var(--accent); box-shadow: var(--sh); }
.si.dn { background: #444; }

/* Common UI */
.card { background: var(--card); border: 1px solid var(--border); border-radius: 8px; padding: 20px; margin-bottom: 16px; }
.card-lbl { font-size: 0.7rem; font-weight: 800; color: var(--text-dim); margin-bottom: 16px; letter-spacing: 1px; text-transform: uppercase; }
.btn { display: inline-flex; align-items: center; justify-content: center; padding: 14px 24px; border-radius: 4px; font-weight: 800; font-size: 0.9rem; border: none; cursor: pointer; transition: 0.2s; }
.btn-p { background: var(--accent); color: white; box-shadow: 0 4px 0 #990049; }
.btn-p:active { transform: translateY(2px); box-shadow: 0 2px 0 #990049; }
.btn-p:disabled { background: #444; box-shadow: none; opacity: 0.5; cursor: not-allowed; }
.btn-g { background: #222; color: #fff; border: 1px solid #333; }

/* Upload & Camera */
.upload-area { border: 2px dashed #333; padding: 40px 20px; text-align: center; border-radius: 8px; cursor: pointer; }
#cam-wrap { position:relative; background:#000; border: 4px solid #222; border-radius: 4px; overflow: hidden; aspect-ratio: 4/3; }
#video { width: 100%; height: 100%; object-fit: cover; transform: scaleX(-1); }
#cam-cv { position:absolute; inset:0; width:100%; height:100%; pointer-events:none; }
#cam-cd { position:absolute; inset:0; display:flex; align-items:center; justify-content:center; font-size:6rem; font-family:'Orbitron'; color:var(--accent); opacity:0; pointer-events:none; }
.th-box { width:60px; height:45px; background:#222; border-radius:2px; overflow:hidden; border:1px solid #333; }
.th-box img { width:100%; height:100%; object-fit:cover; }

/* Modal & Drag */
.slot-modal-bg { display:none; position:fixed; inset:0; background:rgba(0,0,0,0.9); z-index:500; align-items:center; justify-content:center; padding:20px; }
.slot-modal-bg.open { display:flex; }
.slot-modal { background:var(--card); border:1px solid var(--border); border-radius:8px; width:100%; max-width:400px; padding:20px; }
.slot-modal-canvas { width:100%; background:#000; position:relative; overflow:hidden; aspect-ratio:4/3; margin-bottom:15px; border: 1px solid #333; }
.cdrag { position:absolute; user-select:none; touch-action:none; }
.cdrag img { width:100%; display:block; pointer-events:none; }

/* Screens */
.screen { display:none; }
.screen.active { display:block; }
#result-wrap { display: flex; gap: 15px; overflow-x: auto; padding: 10px 0; }
.film-card { flex-shrink: 0; border: 2px solid transparent; cursor: pointer; }
.film-card.picked { border-color: var(--accent); }
.album-item { background: #000; border: 1px solid #333; border-radius: 4px; padding: 10px; cursor: pointer; transition: 0.2s; }
.album-item:hover { border-color: var(--accent); }

input[type=file] { display:none; }
.row { display:flex; gap:10px; align-items:center; }
.btw { justify-content: space-between; }
.center { justify-content: center; }
.mt { margin-top: 15px; }
</style>
</head>
<body>
<div class="app">
  <div class="hd">
    <div class="logo" onclick="location.reload()">BOOTH 4</div>
    <button class="hd-album" onclick="goTo(4)">FRAME ARCHIVE</button>
  </div>

  <div class="steps">
    <div class="si on" id="si0"></div>
    <div class="si" id="si1"></div>
    <div class="si" id="si2"></div>
    <div class="si" id="si3"></div>
  </div>

  <div class="screen active" id="sc0">
    <div class="card">
      <div class="card-lbl">1. UPLOAD PNG/GIF</div>
      <label for="celebInput">
        <div class="upload-area">
          <p style="font-weight:600;">클릭하여 이미지 업로드</p>
          <p style="font-size:0.7rem; color:var(--text-dim); margin-top:8px;">최대 1.5MB 이하 권장 (GIF 지원)</p>
        </div>
      </label>
      <input type="file" id="celebInput" accept="image/*" multiple>
      <div id="celeb-strip" class="row mt" style="overflow-x:auto; padding-bottom:10px;"></div>
      <button class="btn btn-p mt" id="btn0" style="width:100%" disabled onclick="goTo(1)">프레임 배치하기 →</button>
    </div>
  </div>

  <div class="screen" id="sc1">
    <div class="card">
      <div class="card-lbl">2. ARRANGE SLOTS</div>
      <div id="frame-builder" style="display:grid; grid-template-columns:1fr 1fr; gap:10px;">
        <div class="fslot" id="fs0" onclick="openSlotModal(0)" style="border:1px solid #333; background:#000; aspect-ratio:4/3; position:relative; overflow:hidden; cursor:pointer;"></div>
        <div class="fslot" id="fs1" onclick="openSlotModal(1)" style="border:1px solid #333; background:#000; aspect-ratio:4/3; position:relative; overflow:hidden; cursor:pointer;"></div>
        <div class="fslot" id="fs2" onclick="openSlotModal(2)" style="border:1px solid #333; background:#000; aspect-ratio:4/3; position:relative; overflow:hidden; cursor:pointer;"></div>
        <div class="fslot" id="fs3" onclick="openSlotModal(3)" style="border:1px solid #333; background:#000; aspect-ratio:4/3; position:relative; overflow:hidden; cursor:pointer;"></div>
      </div>
      <div class="row btw mt">
        <button class="btn btn-g" onclick="saveFrameToAlbum()">프레임 저장</button>
        <button class="btn btn-p" onclick="goTo(2)">촬영 시작 →</button>
      </div>
    </div>
  </div>

  <div class="screen" id="sc2">
    <div class="card">
      <div class="btw row" style="margin-bottom:15px;"><div class="card-lbl" id="shot-lbl" style="margin:0">0 / 4 SHOTS</div></div>
      <div id="cam-wrap"><video id="video" autoplay playsinline muted></video><canvas id="cam-cv"></canvas><div id="cam-cd"></div></div>
      <div class="row center mt" id="thumb-row" style="gap:5px;"><div class="th-box"></div><div class="th-box"></div><div class="th-box"></div><div class="th-box"></div></div>
      <div class="row btw mt">
        <button class="btn btn-g" onclick="goTo(1)">PREV</button>
        <button class="btn btn-p" id="btn-shoot" onclick="shoot()">📸 SHOOT</button>
        <button class="btn btn-p" id="btn-done" style="display:none;" onclick="goTo(3)">RESULT →</button>
      </div>
    </div>
  </div>

  <div class="screen" id="sc3">
    <div class="card">
      <div class="card-lbl">SELECT YOUR FILM</div>
      <div id="result-wrap"></div>
      <div class="row btw mt">
        <button class="btn btn-g" onclick="reshot()">RE-SHOOT</button>
        <button class="btn btn-p" onclick="dlPicked()">DOWNLOAD</button>
      </div>
    </div>
  </div>

  <div class="screen" id="sc4">
    <div class="card">
      <div class="card-lbl">SAVED FRAME ARCHIVE (0 / 5)</div>
      <div id="album-grid" style="display:grid; grid-template-columns:1fr 1fr; gap:12px;"></div>
      <button class="btn btn-g mt" style="width:100%" onclick="goTo(0)">새 프레임 만들기</button>
    </div>
  </div>
</div>

<div class="slot-modal-bg" id="slot-modal">
  <div class="slot-modal">
    <div class="card-lbl">ARRANGE ELEMENTS</div>
    <div class="slot-modal-canvas" id="slot-modal-canvas"></div>
    <div class="row center mt" id="modal-picker" style="overflow-x:auto; padding:10px 0;"></div>
    <div class="row btw mt">
      <button class="btn btn-g" onclick="clearModalSlot()">CLEAR</button>
      <button class="btn btn-p" onclick="closeSlotModal()">DONE</button>
    </div>
  </div>
</div>
<canvas id="hc" style="display:none"></canvas>

<script>
const S = {
  celebs: [],
  slots: [[],[],[],[]],
  shots: [null,null,null,null],
  cur: 0,
  modalSlot: null,
  stream: null,
  raf: null,
  frameAlbum: JSON.parse(localStorage.getItem('booth_frame_album') || '[]')
};

function goTo(n) {
  document.querySelectorAll('.screen').forEach((s, i) => s.classList.toggle('active', i === n));
  document.querySelectorAll('.si').forEach((s, i) => {
    s.classList.toggle('on', i === n);
    s.classList.toggle('dn', i < n);
  });
  if(n === 2) initCam(); else stopOverlay();
  if(n === 3) buildResult();
  if(n === 4) renderFrameAlbum();
}

/* STEP 0: 업로드 (용량 체크 & Base64 저장) */
document.getElementById('celebInput').addEventListener('change', e => {
  [...e.target.files].forEach(f => {
    if (f.size > 1.5 * 1024 * 1024) {
      alert(`${f.name} 파일이 너무 큽니다. (1.5MB 이하 권장)`);
      return;
    }
    const reader = new FileReader();
    reader.onload = (ev) => {
      const src = ev.target.result;
      const img = new Image();
      img.onload = () => {
        S.celebs.push({ img, src });
        renderStrip();
        document.getElementById('btn0').disabled = false;
      };
      img.src = src;
    };
    reader.readAsDataURL(f);
  });
});

function renderStrip() {
  document.getElementById('celeb-strip').innerHTML = S.celebs.map(c => 
    `<img src="${c.src}" style="height:60px; border:1px solid #333; border-radius:4px; margin-right:5px;">`
  ).join('');
}

/* STEP 1: 프레임 저장 (5개 제한) */
function saveFrameToAlbum() {
  if (S.frameAlbum.length >= 5) {
    alert("저장 공간이 가득 찼습니다 (최대 5개). 기존 프레임을 삭제해 주세요.");
    return goTo(4);
  }
  if (S.slots.every(s => s.length === 0)) return alert("배치된 이미지가 없습니다.");

  try {
    const frameData = {
      id: Date.now(),
      celebsSrc: S.celebs.map(c => c.src),
      slots: JSON.parse(JSON.stringify(S.slots))
    };
    S.frameAlbum.push(frameData);
    localStorage.setItem('booth_frame_album', JSON.stringify(S.frameAlbum));
    alert("프레임이 저장되었습니다!");
  } catch (e) {
    alert("용량 초과로 저장할 수 없습니다. 이미지를 줄여주세요.");
  }
}

/* STEP 4: 앨범 관리 */
function renderFrameAlbum() {
  const grid = document.getElementById('album-grid');
  grid.innerHTML = '';
  document.querySelector('#sc4 .card-lbl').textContent = `SAVED FRAME ARCHIVE (${S.frameAlbum.length} / 5)`;

  S.frameAlbum.forEach((frame, idx) => {
    const item = document.createElement('div');
    item.className = 'album-item';
    item.innerHTML = `
      <div style="font-size:0.6rem; color:#888; margin-bottom:5px;">FRAME #${idx+1}</div>
      <div style="display:grid; grid-template-columns:1fr 1fr; gap:3px; background:#111; padding:3px; pointer-events:none;">
        ${frame.slots.map(s => `<div style="aspect-ratio:4/3; background:#222; position:relative; overflow:hidden;">
          ${s.map(el => `<img src="${frame.celebsSrc[el.ci]}" style="position:absolute; left:${el.x}%; top:${el.y}%; width:${el.w}%;">`).join('')}
        </div>`).join('')}
      </div>
      <div class="row btw mt">
        <button class="btn btn-g" style="padding:5px; font-size:0.7rem; flex:1;" onclick="deleteFrame(${idx}, event)">삭제</button>
        <button class="btn btn-p" style="padding:5px; font-size:0.7rem; flex:2;">불러오기</button>
      </div>
    `;
    item.onclick = () => loadFrame(idx);
    grid.appendChild(item);
  });
}

async function loadFrame(idx) {
  const frame = S.frameAlbum[idx];
  S.celebs = [];
  for(let src of frame.celebsSrc) {
    const img = await new Promise(res => { const i = new Image(); i.onload = () => res(i); i.src = src; });
    S.celebs.push({ img, src });
  }
  S.slots = JSON.parse(JSON.stringify(frame.slots));
  S.slots.forEach((_, i) => renderMiniSlot(i));
  renderStrip();
  goTo(1);
}

function deleteFrame(idx, e) {
  e.stopPropagation();
  if(confirm("이 프레임을 삭제할까요?")) {
    S.frameAlbum.splice(idx, 1);
    localStorage.setItem('booth_frame_album', JSON.stringify(S.frameAlbum));
    renderFrameAlbum();
  }
}

/* --- 모달 이미지 배치 로직 --- */
function openSlotModal(idx) { S.modalSlot = idx; renderModalCanvas(); renderModalPicker(); document.getElementById('slot-modal').classList.add('open'); }
function renderModalPicker() { document.getElementById('modal-picker').innerHTML = S.celebs.map((c, i) => `<img src="${c.src}" onclick="addToSlot(${i})" style="height:50px; cursor:pointer; border:1px solid #444; margin: 0 5px;">`).join(''); }
function addToSlot(ci) { S.slots[S.modalSlot].push({ ci, x: 25, y: 10, w: 50 }); renderModalCanvas(); }
function renderModalCanvas() {
  const container = document.getElementById('slot-modal-canvas'); container.innerHTML = '';
  S.slots[S.modalSlot].forEach((item, i) => {
    const el = document.createElement('div'); el.className = 'cdrag'; el.style.left = item.x + '%'; el.style.top = item.y + '%'; el.style.width = item.w + '%';
    const img = document.createElement('img'); img.src = S.celebs[item.ci].src; el.appendChild(img); container.appendChild(el);
    const move = (e) => {
      const rect = container.getBoundingClientRect(); const clientX = e.touches ? e.touches[0].clientX : e.clientX; const clientY = e.touches ? e.touches[0].clientY : e.clientY;
      item.x = ((clientX - rect.left - (el.offsetWidth/2)) / rect.width) * 100; item.y = ((clientY - rect.top - (el.offsetHeight/2)) / rect.height) * 100;
      el.style.left = item.x + '%'; el.style.top = item.y + '%';
    };
    el.onmousedown = el.ontouchstart = (e) => { e.preventDefault(); document.onmousemove = document.ontouchmove = move; document.onmouseup = document.ontouchend = () => { document.onmousemove = document.ontouchmove = null; }; };
  });
}
function closeSlotModal() { renderMiniSlot(S.modalSlot); document.getElementById('slot-modal').classList.remove('open'); }
function clearModalSlot() { S.slots[S.modalSlot] = []; renderModalCanvas(); }
function renderMiniSlot(idx) {
  const fs = document.getElementById(`fs${idx}`); fs.innerHTML = '';
  S.slots[idx].forEach(item => { const img = document.createElement('img'); img.src = S.celebs[item.ci].src; img.style.position = 'absolute'; img.style.left = item.x + '%'; img.style.top = item.y + '%'; img.style.width = item.w + '%'; fs.appendChild(img); });
}

/* --- 촬영 로직 --- */
async function initCam() { const v = document.getElementById('video'); if (!S.stream) { S.stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'user' }, audio: false }); v.srcObject = S.stream; } startOverlay(); }
function startOverlay() {
  const oc = document.getElementById('cam-cv'), ctx = oc.getContext('2d'), v = document.getElementById('video');
  const step = () => { if(v.videoWidth) { oc.width = v.videoWidth; oc.height = v.videoHeight; ctx.clearRect(0,0,oc.width,oc.height); S.slots[S.cur].forEach(item => { const cel = S.celebs[item.ci]; const w = oc.width * (item.w/100); const h = w * (cel.img.height/cel.img.width); ctx.drawImage(cel.img, oc.width*(item.x/100), oc.height*(item.y/100), w, h); }); } S.raf = requestAnimationFrame(step); };
  step();
}
function stopOverlay() { cancelAnimationFrame(S.raf); }
async function shoot() {
  if (S.cur >= 4) return;
  const cd = document.getElementById('cam-cd'); cd.style.opacity = 1;
  for(let i=3; i>0; i--) { cd.textContent = i; await new Promise(r=>setTimeout(r, 600)); }
  cd.style.opacity = 0;
  const v = document.getElementById('video'), hc = document.getElementById('hc'), ctx = hc.getContext('2d');
  hc.width = v.videoWidth; hc.height = v.videoHeight; ctx.save(); ctx.scale(-1, 1); ctx.drawImage(v, -hc.width, 0, hc.width, hc.height); ctx.restore(); ctx.drawImage(document.getElementById('cam-cv'), 0, 0);
  S.shots[S.cur] = hc.toDataURL('image/jpeg', 0.9);
  document.querySelectorAll('.th-box')[S.cur].innerHTML = `<img src="${S.shots[S.cur]}">`;
  S.cur++; document.getElementById('shot-lbl').textContent = `${S.cur} / 4 SHOTS`;
  if(S.cur === 4) { document.getElementById('btn-shoot').style.display = 'none'; document.getElementById('btn-done').style.display = 'inline-flex'; }
}
function reshot() { S.cur = 0; S.shots = [null,null,null,null]; document.querySelectorAll('.th-box').forEach(el => el.innerHTML = ''); document.getElementById('shot-lbl').textContent = `0 / 4 SHOTS`; document.getElementById('btn-shoot').style.display = 'inline-flex'; document.getElementById('btn-done').style.display = 'none'; goTo(2); }

/* --- 결과물 생성 --- */
async function buildResult() {
  const wrap = document.getElementById('result-wrap'); wrap.innerHTML = '';
  const themes = [{bg:'#111', text:'#eee'}, {bg:'#fff', text:'#111'}];
  for(let t of themes) {
    const canvas = document.createElement('canvas'); const ctx = canvas.getContext('2d');
    const FW = 400, PAD = 20, GAP = 10, SW = FW - (PAD * 2), SH = SW * 0.75;
    canvas.width = FW; canvas.height = (PAD * 2) + (SH * 4) + (GAP * 3) + 80;
    ctx.fillStyle = t.bg; ctx.fillRect(0, 0, canvas.width, canvas.height);
    for(let i=0; i<4; i++) { if(S.shots[i]) { const img = await new Promise(res => { const img = new Image(); img.onload=()=>res(img); img.src=S.shots[i]; }); ctx.drawImage(img, PAD, PAD + (i * (SH + GAP)), SW, SH); } }
    const imgData = ctx.getImageData(0,0,canvas.width,canvas.height), d = imgData.data;
    for (let i=0; i<d.length; i+=4) { const r = (Math.random()-0.5)*12; d[i]+=r; d[i+1]+=r; d[i+2]+=r; }
    ctx.putImageData(imgData, 0, 0);
    ctx.fillStyle = t.text; ctx.font = 'bold 18px Orbitron'; ctx.textAlign = 'center'; ctx.fillText('STUDIO BOOTH 4', FW/2, canvas.height - 35);
    const div = document.createElement('div'); div.className = 'film-card'; canvas.style.width = '140px'; div.appendChild(canvas);
    div.onclick = () => { document.querySelectorAll('.film-card').forEach(c => c.classList.remove('picked')); div.classList.add('picked'); S.picked_data = canvas.toDataURL('image/jpeg', 0.9); };
    wrap.appendChild(div);
  }
}
function dlPicked() { if(!S.picked_data) return alert('필름을 선택해주세요!'); const link = document.createElement('a'); link.download = 'booth4cuts.jpg'; link.href = S.picked_data; link.click(); }
</script>
</body>
</html>
