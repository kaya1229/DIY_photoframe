<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>BOOTH 4 CUTS</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700&family=Pretendard:wght@400;600;800&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0a0a0a; --card: #151515; --accent: #ff007a; --text: #ffffff;
  --text-dim: #888888; --border: #222222; --sh: 0 0 20px rgba(255, 0, 122, 0.4);
}
* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
body { font-family: 'Pretendard', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; overflow-x: hidden; }
.app { position:relative; max-width:500px; margin:0 auto; padding: 20px 16px 100px; }

/* UI Headers */
.hd { display:none; justify-content:space-between; align-items:center; padding:10px 0 30px; }
.logo { font-family: 'Orbitron', sans-serif; font-size: 1.4rem; letter-spacing: 2px; color: var(--accent); text-shadow: var(--sh); cursor:pointer; }
.steps { display:none; gap:8px; margin-bottom:24px; }
.si { flex:1; height:4px; background:var(--border); border-radius:2px; }
.si.on { background: var(--accent); box-shadow: var(--sh); }
.si.dn { background: #444; }

/* Cards & Buttons */
.card { background: var(--card); border: 1px solid var(--border); border-radius: 8px; padding: 20px; margin-bottom: 16px; }
.card-lbl { font-size: 0.7rem; font-weight: 800; color: var(--text-dim); margin-bottom: 16px; letter-spacing: 1px; text-transform: uppercase; }
.btn { display: inline-flex; align-items: center; justify-content: center; padding: 14px 24px; border-radius: 4px; font-weight: 800; font-size: 0.9rem; border: none; cursor: pointer; transition: 0.2s; }
.btn-p { background: var(--accent); color: white; box-shadow: 0 4px 0 #990049; }
.btn-p:active { transform: translateY(2px); box-shadow: 0 2px 0 #990049; }
.btn-p:disabled { background: #444; box-shadow: none; opacity: 0.5; }
.btn-g { background: #222; color: #fff; border: 1px solid #333; }

/* Film Selection Styles */
.film-card { flex-shrink: 0; border: 3px solid transparent; cursor: pointer; transition: 0.3s; padding: 4px; border-radius: 6px; }
.film-card.picked { border-color: var(--accent); background: rgba(255, 0, 122, 0.1); box-shadow: var(--sh); transform: scale(1.02); }

/* Camera & Slot Grid */
#cam-wrap { position:relative; background:#000; border: 4px solid #222; border-radius: 4px; overflow: hidden; width: 100%; }
#video { width: 100%; height: 100%; object-fit: cover; transform: scaleX(-1); }
#cam-cv { position:absolute; inset:0; width:100%; height:100%; pointer-events:none; }
#cam-cd { position:absolute; inset:0; display:flex; align-items:center; justify-content:center; font-size:6rem; font-family:'Orbitron'; color:var(--accent); opacity:0; pointer-events:none; z-index:10; }

.slot-grid { display:grid; grid-template-columns: 1fr 1fr; gap: 10px; }
.fslot { border:1px solid #333; background:#000; position:relative; overflow:hidden; width:100%; cursor: pointer; }

/* Archive Styles */
.archive-preview { background:#000; border:1px solid #333; width:100%; position:relative; overflow:hidden; border-radius:4px; margin-bottom:8px; display: block; }

/* Modal & Interaction */
.slot-modal-bg { display:none; position:fixed; inset:0; background:rgba(0,0,0,0.95); z-index:500; align-items:center; justify-content:center; padding:20px; }
.slot-modal-bg.open { display:flex; }
.slot-modal { background:var(--card); border:1px solid var(--border); border-radius:8px; width:100%; max-width:400px; padding:20px; }
.slot-modal-canvas { width:100%; background:#000; position:relative; overflow:hidden; margin-bottom:15px; border: 1px solid #333; touch-action: none; }
.cdrag { position:absolute; user-select:none; will-change: transform, width, top, left; }
.cdrag img { width:100%; display:block; pointer-events:none; }

.screen { display:none; }
.screen.active { display:block; }
.row { display:flex; gap:10px; align-items:center; }
.btw { justify-content: space-between; }
.mt { margin-top: 15px; }

#home-screen { text-align: center; padding-top: 80px; }
#home-screen h1 { font-family: 'Orbitron'; font-size: 2.5rem; margin-bottom: 40px; color: var(--accent); text-shadow: var(--sh); }
</style>
</head>
<body>
<div class="app">
  <div class="hd" id="global-header">
    <div class="logo" onclick="location.reload()">BOOTH 4</div>
    <button class="btn btn-g" style="padding:5px 10px; font-size:0.7rem;" onclick="goTo('home')">HOME</button>
  </div>

  <div class="steps" id="step-bar">
    <div class="si on"></div><div class="si"></div><div class="si"></div><div class="si"></div><div class="si"></div>
  </div>

  <div class="screen active" id="home-screen">
    <h1>STUDIO<br>BOOTH 4</h1>
    <button class="btn btn-p" style="width:100%; padding:25px; font-size:1.1rem; margin-bottom:12px;" onclick="goTo(0)">START SHOOTING</button>
    <button class="btn btn-g" style="width:100%; padding:20px;" onclick="goTo(5)">FRAME ARCHIVE</button>
  </div>

  <div class="screen" id="sc0">
  <div class="card">
    <div class="card-lbl">0. SELECT FILM LAYOUT</div>
    <div class="row" style="gap:15px;">
      <div class="mode-card on" id="m-v" onclick="setMode('v')" style="border:2px solid var(--accent); padding:15px; text-align:center; border-radius:8px; cursor:pointer; flex:1; background:rgba(255,0,122,0.05);">
        <div style="width:30px; height:50px; border:2px solid #555; margin:0 auto 10px; display:flex; flex-direction:column; gap:2px; padding:3px;">
          <div style="flex:1; background:#333;"></div><div style="flex:1; background:#333;"></div>
          <div style="flex:1; background:#333;"></div><div style="flex:1; background:#333;"></div>
        </div>
        <div style="font-weight:800; font-size:0.8rem;">1 x 4</div>
      </div>
      <div class="mode-card" id="m-q" onclick="setMode('q')" style="border:2px solid #222; padding:15px; text-align:center; border-radius:8px; cursor:pointer; flex:1;">
        <div style="width:40px; height:40px; border:2px solid #555; margin:0 auto 10px; display:grid; grid-template-columns:1fr 1fr; gap:2px; padding:3px;">
          <div style="background:#333;"></div><div style="background:#333;"></div>
          <div style="background:#333;"></div><div style="background:#333;"></div>
        </div>
        <div style="font-weight:800; font-size:0.8rem;">2 x 2</div>
      </div>
    </div>
    <button class="btn btn-p mt" style="width:100%" onclick="goTo(1)">NEXT →</button>
  </div>
</div>

  <div class="screen" id="sc1">
    <div class="card">
      <div class="card-lbl">1. UPLOAD ELEMENTS</div>
      <label for="celebInput">
        <div style="border: 2px dashed #333; padding: 40px 20px; text-align: center; border-radius: 8px; cursor: pointer;">
          <p>PNG/GIF 업로드</p>
        </div>
      </label>
      <input type="file" id="celebInput" accept="image/*" multiple style="display:none">
      <div id="celeb-strip" class="row mt" style="overflow-x:auto;"></div>
     <button class="btn btn-p mt" id="btn1" style="width:100%" onclick="goTo(2)">ARRANGE →</button>
    </div>
  </div>

  <div class="screen" id="sc2">
    <div class="card">
      <div class="card-lbl">2. ARRANGE SLOTS (Tap to Edit)</div>
      <div id="slot-grid" class="slot-grid">
        <div class="fslot" id="fs0" onclick="openSlotModal(0)"></div>
        <div class="fslot" id="fs1" onclick="openSlotModal(1)"></div>
        <div class="fslot" id="fs2" onclick="openSlotModal(2)"></div>
        <div class="fslot" id="fs3" onclick="openSlotModal(3)"></div>
      </div>
      <div class="row mt">
        <button class="btn btn-g" style="flex:1" onclick="saveFrameToAlbum()">SAVE</button>
        <button class="btn btn-p" style="flex:2" onclick="goTo(3)">SHOOT →</button>
      </div>
    </div>
  </div>

  <div class="screen" id="sc3">
    <div class="card">
      <div class="card-lbl" id="shot-lbl">0 / 4 SHOTS</div>
      <div id="cam-wrap"><video id="video" autoplay playsinline muted></video><canvas id="cam-cv"></canvas><div id="cam-cd"></div></div>
      <button class="btn btn-p mt" id="btn-shoot" style="width:100%" onclick="shoot()">📸 SHOOT</button>
    </div>
  </div>

  <div class="screen" id="sc4">
    <div class="card">
      <div class="card-lbl">CHOOSE YOUR FILM</div>
      <div id="result-wrap" style="display:flex; gap:16px; overflow-x:auto; padding:10px 5px;"></div>
      <div class="row btw mt">
        <button class="btn btn-g" onclick="reshot()">RE-SHOOT</button>
        <button class="btn btn-p" id="btn-dl" disabled onclick="dlPicked()">DOWNLOAD</button>
      </div>
    </div>
  </div>

  <div class="screen" id="sc5">
    <div class="card">
      <div class="card-lbl" id="archive-lbl">ARCHIVE (0/10)</div>
      <div id="album-grid" style="display:grid; grid-template-columns:1fr 1fr; gap:12px;"></div>
      <button class="btn btn-g mt" style="width:100%" onclick="goTo('home')">BACK</button>
    </div>
  </div>
</div>

<div class="slot-modal-bg" id="slot-modal">
  <div class="slot-modal">
    <div class="card-lbl">Move: Drag / Zoom: Pinch or Scroll</div>
    <div class="slot-modal-canvas" id="slot-modal-canvas"></div>
    <div id="modal-picker" class="row" style="overflow-x:auto; padding-bottom:5px;"></div>
    <div class="row btw mt">
      <button class="btn btn-g" onclick="clearModalSlot()">CLEAR</button>
      <button class="btn btn-p" onclick="closeSlotModal()">DONE</button>
    </div>
  </div>
</div>
<canvas id="hc" style="display:none"></canvas>

<script>
const S = {
  mode: 'v', celebs: [], slots: [[],[],[],[]], shots: [null,null,null,null], cur: 0,
  modalSlot: null, stream: null, raf: null, picked_data: null, camRatio: 4/3,
  frameAlbum: JSON.parse(localStorage.getItem('booth_frame_album') || '[]')
};

function setMode(m) {
  S.mode = m;
  document.getElementById('m-v').style.borderColor = (m === 'v') ? 'var(--accent)' : '#222';
  document.getElementById('m-q').style.borderColor = (m === 'q') ? 'var(--accent)' : '#222';
}

function goTo(n) {
  const screens = ['home-screen', 'sc0', 'sc1', 'sc2', 'sc3', 'sc4', 'sc5'];
  let idx = (n === 'home') ? 0 : (typeof n === 'number' ? n + 1 : 6);
  
  // 1. 새로운 촬영 시작 시 데이터 초기화 (추가된 부분)
  if (n === 0) {
    S.slots = [[], [], [], []]; // 슬롯 배치 초기화
    S.shots = [null, null, null, null]; // 촬영된 이미지 초기화
    S.cur = 0; // 현재 촬영 순서 초기화
    S.celebs = []; // 업로드된 이미지 리스트 초기화 (필요 시)
    
    // UI에 반영 (슬롯 비우기 및 업로드 리스트 비우기)
    for (let i = 0; i < 4; i++) renderMiniSlot(i);
    renderStrip();
    document.getElementById('shot-lbl').textContent = `0 / 4 SHOTS`;
    document.getElementById('btn1').disabled = false; // 업로드 단계 버튼 활성화 상태 유지
  }

  // 화면 전환 로직
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(screens[idx]).classList.add('active');
  document.getElementById('global-header').style.display = (idx === 0) ? 'none' : 'flex';
  document.getElementById('step-bar').style.display = (idx > 0 && idx < 6) ? 'flex' : 'none';

  if(n === 2) applyRatioToUI();
  if(n === 3) initCam(); else stopOverlay();
  if(n === 4) buildResult();
  if(n === 5) renderFrameAlbum();

  if(typeof n === 'number' && n <= 4) {
    document.querySelectorAll('.si').forEach((s, i) => {
      s.classList.toggle('on', i === n);
      s.classList.toggle('dn', i < n);
    });
  }
}

async function initCam() {
  const v = document.getElementById('video');
  if (!S.stream) {
    S.stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'user' }, audio: false });
    v.srcObject = S.stream;
    v.onloadedmetadata = () => { S.camRatio = v.videoWidth / v.videoHeight; applyRatioToUI(); };
  }
  startOverlay();
}

function applyRatioToUI() {
  document.querySelectorAll('.fslot, #slot-modal-canvas, #cam-wrap, .archive-preview').forEach(el => { 
    if(el) el.style.aspectRatio = S.camRatio; 
  });
}

/* 1. Upload */
document.getElementById('celebInput').onchange = e => {
  [...e.target.files].forEach(f => {
    const reader = new FileReader();
    reader.onload = ev => {
      const img = new Image();
      img.onload = () => { 
        S.celebs.push({ img, src: ev.target.result }); 
        renderStrip(); 
        // 버튼을 활성화하는 코드를 명시적으로 추가 (HTML에서 이미 disabled를 뺐다면 안전장치 역할)
        document.getElementById('btn1').disabled = false; 
      };
      img.src = ev.target.result;
    };
    reader.readAsDataURL(f);
  });
};
function renderStrip() { document.getElementById('celeb-strip').innerHTML = S.celebs.map(c => `<img src="${c.src}" style="height:40px; border:1px solid #333; margin-right:5px;">`).join(''); }

/* 2. Arrange & Zoom Logic */
function openSlotModal(idx) { S.modalSlot = idx; renderModalCanvas(); renderModalPicker(); document.getElementById('slot-modal').classList.add('open'); }
function renderModalPicker() { document.getElementById('modal-picker').innerHTML = S.celebs.map((c, i) => `<img src="${c.src}" onclick="addToSlot(${i})" style="height:40px; margin:5px; border:1px solid #444;">`).join(''); }
function addToSlot(ci) { S.slots[S.modalSlot].push({ ci, x: 25, y: 25, w: 50 }); renderModalCanvas(); }

function renderModalCanvas() {
  const container = document.getElementById('slot-modal-canvas');
  container.innerHTML = '';
  S.slots[S.modalSlot].forEach((item, i) => {
    const el = document.createElement('div'); el.className = 'cdrag';
    el.style.cssText = `left:${item.x}%; top:${item.y}%; width:${item.w}%;`;
    const img = document.createElement('img'); img.src = S.celebs[item.ci].src;
    el.appendChild(img); container.appendChild(el);

    let startDist = 0, startW = 0;
    const handleMove = (e) => {
      e.preventDefault(); const rect = container.getBoundingClientRect(); const ts = e.touches;
      if (ts && ts.length === 2) {
        // Pinch Zoom
        const d = Math.hypot(ts[0].clientX-ts[1].clientX, ts[0].clientY-ts[1].clientY);
        item.w = Math.max(5, Math.min(300, startW * (d / startDist))); el.style.width = item.w + '%';
      } else {
        // Drag
        const t = ts ? ts[0] : e;
        item.x = ((t.clientX - rect.left) / rect.width * 100) - (item.w / 2);
        const hP = (item.w * (img.naturalHeight / img.naturalWidth)) / S.camRatio;
        item.y = ((t.clientY - rect.top) / rect.height * 100) - (hP / 2);
        el.style.left = item.x + '%'; el.style.top = item.y + '%';
      }
    };

    el.onmousedown = el.ontouchstart = (e) => {
      if (e.touches && e.touches.length === 2) { startDist = Math.hypot(e.touches[0].clientX-e.touches[1].clientX, e.touches[0].clientY-e.touches[1].clientY); startW = item.w; }
      document.onmousemove = document.ontouchmove = handleMove;
      document.onmouseup = document.ontouchend = () => { document.onmousemove = null; document.ontouchmove = null; };
    };

    // Wheel Zoom for PC
    el.onwheel = (e) => {
      e.preventDefault();
      const delta = e.deltaY > 0 ? -3 : 3;
      item.w = Math.max(5, Math.min(300, item.w + delta));
      el.style.width = item.w + '%';
    };
  });
}

function closeSlotModal() { renderMiniSlot(S.modalSlot); document.getElementById('slot-modal').classList.remove('open'); }
function clearModalSlot() { S.slots[S.modalSlot] = []; renderModalCanvas(); }
function renderMiniSlot(idx) {
  const fs = document.getElementById(`fs${idx}`); fs.innerHTML = '';
  S.slots[idx].forEach(item => {
    const img = document.createElement('img'); img.src = S.celebs[item.ci].src;
    img.style.cssText = `position:absolute; left:${item.x}%; top:${item.y}%; width:${item.w}%;`;
    fs.appendChild(img);
  });
}

/* 3. Archive Preview & Logic */
function saveFrameToAlbum() {
  if (S.frameAlbum.length >= 10) return alert("Full!");
  S.frameAlbum.push({ mode: S.mode, ratio: S.camRatio, celebsSrc: S.celebs.map(c => c.src), slots: JSON.parse(JSON.stringify(S.slots)) });
  localStorage.setItem('booth_frame_album', JSON.stringify(S.frameAlbum)); alert("Saved!");
}
/* 4. Archive Preview & Logic - 4개 슬롯이 모두 보이도록 수정된 버전 */
function renderFrameAlbum() {
  const grid = document.getElementById('album-grid'); grid.innerHTML = '';
  document.getElementById('archive-lbl').textContent = `ARCHIVE (${S.frameAlbum.length}/10)`;
  
  S.frameAlbum.forEach((f, idx) => {
    const item = document.createElement('div'); item.className = 'card'; item.style.padding = '12px';
    
    // 외곽 프레임 (필름 느낌)
    const preview = document.createElement('div'); 
    preview.className = 'archive-preview'; 
    preview.style.cssText = `
      aspect-ratio: ${f.ratio}; 
      background: #111; 
      padding: 10px; 
      border-radius: 4px; 
      display: grid; 
      gap: 4px;
      grid-template-columns: ${f.mode === 'v' ? '1fr' : '1fr 1fr'};
      box-shadow: inset 0 0 10px rgba(0,0,0,0.5);
    `;
    
    // 각 슬롯 그리기
    f.slots.forEach((slotItems) => {
      const miniSlot = document.createElement('div');
      miniSlot.style.cssText = `position:relative; background:#000; aspect-ratio:${f.ratio}; overflow:hidden; border-radius:2px;`;
      
      slotItems.forEach(s => {
        const img = document.createElement('img'); 
        img.src = f.celebsSrc[s.ci];
        img.style.cssText = `position:absolute; left:${s.x}%; top:${s.y}%; width:${s.w}%; opacity:0.9;`;
        miniSlot.appendChild(img);
      });
      preview.appendChild(miniSlot);
    });

    item.appendChild(preview);
    const info = document.createElement('div');
    info.style.cssText = 'font-size:0.6rem; color:var(--accent); font-weight:800; margin:10px 0; font-family:Orbitron;';
    info.textContent = `${f.mode.toUpperCase()} FRAME ${idx+1}`;
    item.appendChild(info);
    
    const row = document.createElement('div'); row.className = 'row';
    row.innerHTML = `<button class="btn btn-p" style="flex:1; padding:8px; font-size:0.7rem;" onclick="loadFrame(${idx})">LOAD</button>
                     <button class="btn btn-g" style="flex:1; padding:8px; font-size:0.7rem;" onclick="deleteFrame(${idx})">DEL</button>`;
    item.appendChild(row);
    grid.appendChild(item);
  });
}
async function loadFrame(idx) {
  const f = S.frameAlbum[idx]; S.mode = f.mode; S.camRatio = f.ratio; S.celebs = [];
  for(let src of f.celebsSrc) { const i = new Image(); await new Promise(r=>{i.onload=r; i.src=src;}); S.celebs.push({img:i, src}); }
  S.slots = JSON.parse(JSON.stringify(f.slots)); setMode(f.mode); applyRatioToUI(); 
  S.slots.forEach((_, i) => renderMiniSlot(i)); renderStrip(); goTo(2);
}
function deleteFrame(idx) { S.frameAlbum.splice(idx,1); localStorage.setItem('booth_frame_album', JSON.stringify(S.frameAlbum)); renderFrameAlbum(); }

/* 4. Shoot & Build Result */
function startOverlay() {
  const oc = document.getElementById('cam-cv'), ctx = oc.getContext('2d'), v = document.getElementById('video');
  const step = () => { if(v.videoWidth) { 
    oc.width = v.videoWidth; oc.height = v.videoHeight; ctx.clearRect(0,0,oc.width,oc.height);
    S.slots[S.cur].forEach(item => { 
      const cel = S.celebs[item.ci]; const w = oc.width * (item.w/100); const h = w * (cel.img.height/cel.img.width);
      ctx.drawImage(cel.img, oc.width*(item.x/100), oc.height*(item.y/100), w, h);
    });
  } S.raf = requestAnimationFrame(step); }; step();
}
function stopOverlay() { cancelAnimationFrame(S.raf); }
async function shoot() {
  if (S.cur >= 4) return;
  const cd = document.getElementById('cam-cd'); cd.textContent = '3'; cd.style.opacity = 1;
  for(let i=3; i>0; i--) { cd.textContent = i; await new Promise(r=>setTimeout(r, 600)); }
  cd.style.opacity = 0;
  const v = document.getElementById('video'), hc = document.getElementById('hc'), ctx = hc.getContext('2d');
  hc.width = v.videoWidth; hc.height = v.videoHeight;
  ctx.save(); ctx.scale(-1, 1); ctx.drawImage(v, -hc.width, 0, hc.width, hc.height); ctx.restore();
  ctx.drawImage(document.getElementById('cam-cv'), 0, 0);
  S.shots[S.cur] = hc.toDataURL('image/jpeg', 0.9);
  S.cur++; document.getElementById('shot-lbl').textContent = `${S.cur} / 4 SHOTS`;
  if(S.cur === 4) setTimeout(() => goTo(4), 500);
}
function reshot() { 
  S.cur = 0; 
  S.shots = [null,null,null,null]; 
  document.getElementById('shot-lbl').textContent = `0 / 4 SHOTS`; // 카운트 즉시 초기화
  goTo(3); 
}

async function buildResult() {
  const wrap = document.getElementById('result-wrap'); wrap.innerHTML = '';
  const themes = [{bg:'#111', text:'#eee'}, {bg:'#fff', text:'#111'}];
  for(let t of themes) {
    const canvas = document.createElement('canvas'); const ctx = canvas.getContext('2d');
    const FW = 400, PAD = 25, GAP = 15;
    if(S.mode === 'v') {
      const SW = FW - (PAD * 2), SH = SW / S.camRatio;
      canvas.width = FW; canvas.height = (PAD * 2) + (SH * 4) + (GAP * 3) + 100;
      ctx.fillStyle = t.bg; ctx.fillRect(0, 0, canvas.width, canvas.height);
      for(let i=0; i<4; i++) { const img = await loadImg(S.shots[i]); ctx.drawImage(img, PAD, PAD + (i * (SH + GAP)), SW, SH); }
    } else {
      const SW = (FW - (PAD * 2) - GAP) / 2, SH = SW / S.camRatio;
      canvas.width = FW; canvas.height = (PAD * 2) + (SH * 2) + GAP + 100;
      ctx.fillStyle = t.bg; ctx.fillRect(0, 0, canvas.width, canvas.height);
      for(let i=0; i<4; i++) { const img = await loadImg(S.shots[i]); const dx = PAD + (i % 2) * (SW + GAP), dy = PAD + Math.floor(i / 2) * (SH + GAP); ctx.drawImage(img, dx, dy, SW, SH); }
    }
    ctx.fillStyle = t.text; ctx.font = 'bold 20px Orbitron'; ctx.textAlign = 'center'; ctx.fillText('STUDIO BOOTH 4', FW/2, canvas.height - 40);
    
    const dataUrl = canvas.toDataURL('image/jpeg', 0.9);
    const div = document.createElement('div'); div.className = 'film-card';
    const preview = document.createElement('img'); preview.src = dataUrl; preview.style.width = "120px";
    div.appendChild(preview);
    div.onclick = () => { 
      document.querySelectorAll('.film-card').forEach(c => c.classList.remove('picked')); 
      div.classList.add('picked'); 
      S.picked_data = dataUrl; 
      document.getElementById('btn-dl').disabled = false; 
    };
    wrap.appendChild(div);
  }
}
function loadImg(src) { return new Promise(res => { const i = new Image(); i.onload = () => res(i); i.src = src; }); }
function dlPicked() { const a = document.createElement('a'); a.download = 'booth4.jpg'; a.href = S.picked_data; a.click(); }
</script>
