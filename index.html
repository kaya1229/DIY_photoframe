<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>SOFT BOOTH 4</title>
<link href="https://fonts.googleapis.com/css2?family=Gaegu:wght@400;700&family=Pretendard:wght@400;600;800&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #f9fbff; 
  --card: #ffffff; 
  --accent: #7fb3ff; 
  --accent-soft: #eef5ff;
  --text: #444444;
  --text-dim: #99aabb; 
  --border: #e2eaf3;
  --sh: 0 10px 20px rgba(127, 179, 255, 0.15);
}

* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
body { font-family: 'Pretendard', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; overflow-x: hidden; }
.app { position:relative; max-width:500px; margin:0 auto; padding: 20px 16px 100px; }

h1, h2, .logo, .btn, .card-lbl, #cam-cd { font-family: 'Gaegu', sans-serif; }

/* UI Headers */
.hd { display:none; justify-content:space-between; align-items:center; padding:10px 0 30px; }
.logo { font-size: 1.8rem; color: var(--accent); cursor:pointer; font-weight: 700; }

/* Step Bar 수정 (세모 제거 & 몽글몽글) */
.steps { display:none; gap:8px; margin-bottom:30px; }
.si { flex:1; height:10px; background:var(--border); border-radius:20px; transition: 0.3s; }
.si.on { background: var(--accent); transform: scaleY(1.2); }
.si.dn { background: var(--accent-soft); }

/* Card & Buttons (몽글몽글 디자인) */
.card { background: var(--card); border: 1px solid var(--border); border-radius: 28px; padding: 24px; margin-bottom: 20px; box-shadow: var(--sh); }
.card-lbl { font-size: 1.2rem; font-weight: 700; color: var(--accent); margin-bottom: 16px; }

.btn { display: inline-flex; align-items: center; justify-content: center; padding: 16px 24px; border-radius: 50px; font-weight: 700; font-size: 1.1rem; border: none; cursor: pointer; transition: 0.2s; box-shadow: 0 4px 0 rgba(0,0,0,0.05); }
.btn-p { background: var(--accent); color: white; }
.btn-p:active { transform: translateY(3px); box-shadow: none; }
.btn-p:disabled { background: #d0d7de; cursor: not-allowed; }
.btn-g { background: var(--accent-soft); color: var(--accent); }

/* Camera Flash Effect */
#flash { position:absolute; inset:0; background:white; opacity:0; pointer-events:none; z-index:100; transition: opacity 0.1s; }

/* Camera & Grid */
#cam-wrap { position:relative; background:#f0f3f7; border: 10px solid #fff; border-radius: 24px; overflow: hidden; width: 100%; box-shadow: var(--sh); }
#video { width: 100%; height: 100%; object-fit: cover; transform: scaleX(-1); }
#cam-cv { position:absolute; inset:0; width:100%; height:100%; pointer-events:none; }
#cam-cd { position:absolute; inset:0; display:flex; align-items:center; justify-content:center; font-size:7rem; color:var(--accent); opacity:0; pointer-events:none; z-index:10; }

.slot-grid { display:grid; grid-template-columns: 1fr 1fr; gap: 15px; }
.fslot { border:2px dashed var(--border); background:#fff; position:relative; overflow:hidden; width:100%; cursor: pointer; border-radius: 16px; }

/* Archive Styles */
.archive-preview { background:#fff; border:1px solid var(--border); width:100%; position:relative; overflow:hidden; border-radius:18px; margin-bottom:12px; }

/* Modal */
.slot-modal-bg { display:none; position:fixed; inset:0; background:rgba(255,255,255,0.85); backdrop-filter: blur(8px); z-index:500; align-items:center; justify-content:center; padding:20px; }
.slot-modal-bg.open { display:flex; }
.slot-modal { background:var(--card); border-radius:35px; width:100%; max-width:420px; padding:25px; box-shadow: 0 25px 50px rgba(0,0,0,0.1); }
.slot-modal-canvas { width:100%; background:#f0f3f7; position:relative; overflow:hidden; margin-bottom:20px; border-radius:20px; touch-action: none; border: 1px solid var(--border); }
.cdrag { position:absolute; user-select:none; cursor: move; }

.screen { display:none; }
.screen.active { display:block; animation: pop 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
@keyframes pop { from { opacity: 0; transform: scale(0.95); } to { opacity: 1; transform: scale(1); } }

.row { display:flex; gap:12px; align-items:center; }
.btw { justify-content: space-between; }
.mt { margin-top: 20px; }

#celeb-strip img { height: 55px; border-radius: 15px; border: 2px solid var(--border); margin-right: 8px; object-fit: cover; background: white; }
</style>
</head>
<body>
<div class="app">
  <div id="flash"></div>
  <div class="hd" id="global-header">
    <div class="logo" onclick="location.reload()">Soft Booth</div>
    <button class="btn btn-g" style="padding:10px 20px; font-size:0.9rem;" onclick="goTo('home')">HOME</button>
  </div>

  <div class="steps" id="step-bar">
    <div class="si on"></div><div class="si"></div><div class="si"></div><div class="si"></div><div class="si"></div>
  </div>

  <div class="screen active" id="home-screen" style="text-align:center; padding-top:80px;">
    <h1 style="font-size:3.5rem; color:var(--accent); margin-bottom:50px;">몽글몽글<br>네컷 사진관</h1>
    <button class="btn btn-p" style="width:100%; padding:30px; font-size:1.4rem; margin-bottom:16px; border-radius:30px;" onclick="goTo(0)">새로 촬영하기</button>
    <button class="btn btn-g" style="width:100%; padding:22px; border-radius:25px;" onclick="goTo(5)">저장된 프레임</button>
  </div>

  <div class="screen" id="sc0">
    <div class="card">
      <div class="card-lbl">어떤 모양으로 찍을까요?</div>
      <div class="row">
        <div class="btn btn-g" id="m-v" onclick="setMode('v')" style="flex:1; border:2px solid var(--accent);">세로 네컷</div>
        <div class="btn btn-g" id="m-q" onclick="setMode('q')" style="flex:1; border:2px solid var(--border);">쿼드 네컷</div>
      </div>
      <button class="btn btn-p mt" style="width:100%" onclick="goTo(1)">다음으로 →</button>
    </div>
  </div>

  <div class="screen" id="sc1">
    <div class="card">
      <div class="card-lbl">꾸미기 스티커 올리기</div>
      <label for="celebInput">
        <div style="border: 3px dashed var(--accent-soft); padding: 45px 20px; text-align: center; border-radius: 25px; cursor: pointer; background: #fff;">
          <p style="color:var(--accent); font-weight:700; font-size:1.2rem;">사진/움짤 선택</p>
        </div>
      </label>
      <input type="file" id="celebInput" accept="image/*" multiple style="display:none">
      <div id="celeb-strip" class="row mt" style="overflow-x:auto;"></div>
      <button class="btn btn-p mt" style="width:100%" onclick="goTo(2)">배치하러 가기 →</button>
    </div>
  </div>

  <div class="screen" id="sc2">
    <div class="card">
      <div class="card-lbl">슬롯을 눌러 스티커를 배치하세요</div>
      <div id="slot-grid" class="slot-grid">
        <div class="fslot" id="fs0" onclick="openSlotModal(0)"></div>
        <div class="fslot" id="fs1" onclick="openSlotModal(1)"></div>
        <div class="fslot" id="fs2" onclick="openSlotModal(2)"></div>
        <div class="fslot" id="fs3" onclick="openSlotModal(3)"></div>
      </div>
      <div class="row mt">
        <button class="btn btn-g" style="flex:1" onclick="saveFrameToAlbum()">프레임 저장</button>
        <button class="btn btn-p" style="flex:2" onclick="goTo(3)">촬영 시작! →</button>
      </div>
    </div>
  </div>

  <div class="screen" id="sc3">
    <div class="card">
      <div class="card-lbl" id="shot-lbl">READY</div>
      <div id="cam-wrap"><video id="video" autoplay playsinline muted></video><canvas id="cam-cv"></canvas><div id="cam-cd"></div></div>
      <button class="btn btn-p mt" id="btn-shoot" style="width:100%; padding:25px;" onclick="shoot()">📸 찰칵 (3초 대기)</button>
    </div>
  </div>

  <div class="screen" id="sc4">
    <div class="card">
      <div class="card-lbl">완성된 필름 선택</div>
      <div id="result-wrap" style="display:flex; gap:16px; overflow-x:auto; padding:10px 5px;"></div>
      <div class="row btw mt">
        <button class="btn btn-g" onclick="reshot()">다시 촬영</button>
        <button class="btn btn-p" id="btn-dl" disabled onclick="dlPicked()">이미지 저장</button>
      </div>
    </div>
  </div>

  <div class="screen" id="sc5">
    <div class="card">
      <div class="card-lbl" id="archive-lbl">나의 프레임들</div>
      <div id="album-grid" style="display:grid; grid-template-columns:1fr 1fr; gap:15px;"></div>
      <button class="btn btn-g mt" style="width:100%" onclick="goTo('home')">메인으로</button>
    </div>
  </div>
</div>

<div class="slot-modal-bg" id="slot-modal">
  <div class="slot-modal">
    <div class="card-lbl" style="font-size:1rem;">스티커 조절 (드래그/핀치)</div>
    <div class="slot-modal-canvas" id="slot-modal-canvas"></div>
    <div id="modal-picker" class="row" style="overflow-x:auto;"></div>
    <div class="row btw mt">
      <button class="btn btn-g" onclick="clearModalSlot()">초기화</button>
      <button class="btn btn-p" onclick="closeSlotModal()">배치 완료</button>
    </div>
  </div>
</div>
<canvas id="hc" style="display:none"></canvas>

<script>
const S = {
  mode: 'v', celebs: [], slots: [[],[],[],[]], shots: [null,null,null,null], cur: 0,
  modalSlot: null, stream: null, raf: null, picked_data: null, camRatio: 4/3,
  frameAlbum: JSON.parse(localStorage.getItem('booth_frame_album') || '[]')
};

function setMode(m) {
  S.mode = m;
  document.getElementById('m-v').style.borderColor = (m === 'v') ? 'var(--accent)' : 'var(--border)';
  document.getElementById('m-q').style.borderColor = (m === 'q') ? 'var(--accent)' : 'var(--border)';
}

function goTo(n) {
  const screens = ['home-screen', 'sc0', 'sc1', 'sc2', 'sc3', 'sc4', 'sc5'];
  let idx = (n === 'home') ? 0 : (typeof n === 'number' ? n + 1 : 6);
  
  if (n === 0) { 
    S.slots = [[],[],[],[]]; S.shots = [null,null,null,null]; S.cur = 0; 
    for(let i=0; i<4; i++) renderMiniSlot(i);
  }

  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(screens[idx]).classList.add('active');
  document.getElementById('global-header').style.display = (idx === 0) ? 'none' : 'flex';
  document.getElementById('step-bar').style.display = (idx > 0 && idx < 6) ? 'flex' : 'none';

  if(n === 2) applyRatioToUI();
  if(n === 3) initCam(); else stopOverlay();
  if(n === 4) buildResult();
  if(n === 5) renderFrameAlbum();

  if(typeof n === 'number' && n <= 4) {
    document.querySelectorAll('.si').forEach((s, i) => {
      s.classList.toggle('on', i === n);
      s.classList.toggle('dn', i < n);
    });
  }
}

async function initCam() {
  const v = document.getElementById('video');
  if (!S.stream) {
    S.stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'user' }, audio: false });
    v.srcObject = S.stream;
    v.onloadedmetadata = () => { S.camRatio = v.videoWidth / v.videoHeight; applyRatioToUI(); };
  }
  startOverlay();
}

function applyRatioToUI() {
  document.querySelectorAll('.fslot, #slot-modal-canvas, #cam-wrap, .archive-preview').forEach(el => { 
    if(el) el.style.aspectRatio = S.camRatio; 
  });
}

document.getElementById('celebInput').onchange = e => {
  [...e.target.files].forEach(f => {
    const reader = new FileReader();
    reader.onload = ev => {
      const img = new Image();
      img.onload = () => { S.celebs.push({ img, src: ev.target.result }); renderStrip(); };
      img.src = ev.target.result;
    };
    reader.readAsDataURL(f);
  });
};
function renderStrip() { document.getElementById('celeb-strip').innerHTML = S.celebs.map(c => `<img src="${c.src}">`).join(''); }

function openSlotModal(idx) { S.modalSlot = idx; renderModalCanvas(); renderModalPicker(); document.getElementById('slot-modal').classList.add('open'); }
function renderModalPicker() { document.getElementById('modal-picker').innerHTML = S.celebs.map((c, i) => `<img src="${c.src}" onclick="addToSlot(${i})" style="height:50px; margin:5px; border-radius:10px; cursor:pointer;">`).join(''); }
function addToSlot(ci) { S.slots[S.modalSlot].push({ ci, x: 25, y: 25, w: 50 }); renderModalCanvas(); }

function renderModalCanvas() {
  const container = document.getElementById('slot-modal-canvas');
  container.innerHTML = '';
  S.slots[S.modalSlot].forEach((item, i) => {
    const el = document.createElement('div'); el.className = 'cdrag';
    el.style.cssText = `left:${item.x}%; top:${item.y}%; width:${item.w}%; position:absolute;`;
    const img = document.createElement('img'); img.src = S.celebs[item.ci].src;
    img.style.width = '100%'; el.appendChild(img); container.appendChild(el);

    let startDist = 0, startW = 0;
    const handleMove = (e) => {
      e.preventDefault(); const rect = container.getBoundingClientRect(); const ts = e.touches;
      if (ts && ts.length === 2) {
        const d = Math.hypot(ts[0].clientX-ts[1].clientX, ts[0].clientY-ts[1].clientY);
        if(startDist === 0) startDist = d;
        item.w = Math.max(5, Math.min(300, startW * (d / startDist))); el.style.width = item.w + '%';
      } else {
        const t = ts ? ts[0] : e;
        item.x = ((t.clientX - rect.left) / rect.width * 100) - (item.w / 2);
        const hP = (item.w * (img.naturalHeight / img.naturalWidth)) / S.camRatio;
        item.y = ((t.clientY - rect.top) / rect.height * 100) - (hP / 2);
        el.style.left = item.x + '%'; el.style.top = item.y + '%';
      }
    };
    el.onmousedown = el.ontouchstart = (e) => {
      if (e.touches && e.touches.length === 2) { startDist = Math.hypot(e.touches[0].clientX-e.touches[1].clientX, e.touches[0].clientY-e.touches[1].clientY); startW = item.w; }
      document.addEventListener('mousemove', handleMove, {passive:false});
      document.addEventListener('touchmove', handleMove, {passive:false});
      document.onmouseup = document.ontouchend = () => { document.removeEventListener('mousemove', handleMove); document.removeEventListener('touchmove', handleMove); startDist = 0; };
    };
    el.onwheel = (e) => { e.preventDefault(); const delta = e.deltaY > 0 ? -3 : 3; item.w = Math.max(5, Math.min(300, item.w + delta)); el.style.width = item.w + '%'; };
  });
}

function closeSlotModal() { renderMiniSlot(S.modalSlot); document.getElementById('slot-modal').classList.remove('open'); }
function clearModalSlot() { S.slots[S.modalSlot] = []; renderModalCanvas(); }
function renderMiniSlot(idx) {
  const fs = document.getElementById(`fs${idx}`); fs.innerHTML = '';
  S.slots[idx].forEach(item => {
    const img = document.createElement('img'); img.src = S.celebs[item.ci].src;
    img.style.cssText = `position:absolute; left:${item.x}%; top:${item.y}%; width:${item.w}%;`;
    fs.appendChild(img);
  });
}

/* 프레임 저장: 이름 입력 및 대표 슬롯 설정 */
function saveFrameToAlbum() {
  const name = prompt("프레임 이름을 입력해주세요:", "나의 프레임");
  if (!name) return;
  const repIdx = prompt("대표 슬롯 번호를 선택하세요 (1~4):", "1");
  const rep = (parseInt(repIdx) || 1) - 1;

  S.frameAlbum.push({ 
    name, 
    rep, 
    mode: S.mode, 
    ratio: S.camRatio, 
    celebsSrc: S.celebs.map(c => c.src), 
    slots: JSON.parse(JSON.stringify(S.slots)) 
  });
  localStorage.setItem('booth_frame_album', JSON.stringify(S.frameAlbum));
  alert("저장되었습니다!");
}

function renderFrameAlbum() {
  const grid = document.getElementById('album-grid'); grid.innerHTML = '';
  S.frameAlbum.forEach((f, idx) => {
    const item = document.createElement('div'); item.className = 'card'; item.style.padding = '15px';
    const preview = document.createElement('div'); preview.className = 'archive-preview'; preview.style.aspectRatio = f.ratio;
    
    // 대표 슬롯 이미지만 렌더링
    const repSlot = f.slots[f.rep || 0];
    repSlot.forEach(s => {
      const img = document.createElement('img'); img.src = f.celebsSrc[s.ci];
      img.style.cssText = `position:absolute; left:${s.x}%; top:${s.y}%; width:${s.w}%; opacity:0.9;`;
      preview.appendChild(img);
    });

    item.innerHTML = `<div style="font-family:Gaegu; font-weight:700; margin-bottom:8px; color:var(--accent);">${f.name}</div>`;
    item.prepend(preview);
    const row = document.createElement('div'); row.className = 'row';
    row.innerHTML = `<button class="btn btn-p" style="flex:1; padding:8px; font-size:0.8rem;" onclick="loadFrame(${idx})">로드</button>
                     <button class="btn btn-g" style="flex:1; padding:8px; font-size:0.8rem;" onclick="deleteFrame(${idx})">삭제</button>`;
    item.appendChild(row); grid.appendChild(item);
  });
}

/* 앨범 로드 시 촬영 카운트 초기화 수정 */
async function loadFrame(idx) {
  const f = S.frameAlbum[idx]; S.mode = f.mode; S.camRatio = f.ratio; S.celebs = [];
  for(let src of f.celebsSrc) { const i = new Image(); await new Promise(r=>{i.onload=r; i.src=src;}); S.celebs.push({img:i, src}); }
  S.slots = JSON.parse(JSON.stringify(f.slots));
  S.cur = 0; // 촬영 카운트 초기화 (핵심!)
  S.shots = [null,null,null,null];
  setMode(f.mode); applyRatioToUI(); 
  S.slots.forEach((_, i) => renderMiniSlot(i)); 
  renderStrip(); 
  document.getElementById('shot-lbl').textContent = `0 / 4 SHOTS`;
  goTo(2);
}

function deleteFrame(idx) { S.frameAlbum.splice(idx,1); localStorage.setItem('booth_frame_album', JSON.stringify(S.frameAlbum)); renderFrameAlbum(); }

function startOverlay() {
  const oc = document.getElementById('cam-cv'), ctx = oc.getContext('2d'), v = document.getElementById('video');
  const step = () => { if(v.videoWidth) { 
    oc.width = v.videoWidth; oc.height = v.videoHeight; ctx.clearRect(0,0,oc.width,oc.height);
    S.slots[S.cur].forEach(item => { 
      const cel = S.celebs[item.ci]; const w = oc.width * (item.w/100); const h = w * (cel.img.height/cel.img.width);
      ctx.drawImage(cel.img, oc.width*(item.x/100), oc.height*(item.y/100), w, h);
    });
  } S.raf = requestAnimationFrame(step); }; step();
}
function stopOverlay() { cancelAnimationFrame(S.raf); }

async function shoot() {
  if (S.cur >= 4) return;
  const cd = document.getElementById('cam-cd'); cd.textContent = '3'; cd.style.opacity = 1;
  for(let i=3; i>0; i--) { cd.textContent = i; await new Promise(r=>setTimeout(r, 600)); }
  cd.style.opacity = 0;
  
  // 촬영 플래시 효과
  const flash = document.getElementById('flash');
  flash.style.opacity = 1; setTimeout(() => flash.style.opacity = 0, 100);

  const v = document.getElementById('video'), hc = document.getElementById('hc'), ctx = hc.getContext('2d');
  hc.width = v.videoWidth; hc.height = v.videoHeight;
  ctx.save(); ctx.scale(-1, 1); ctx.drawImage(v, -hc.width, 0, hc.width, hc.height); ctx.restore();
  ctx.drawImage(document.getElementById('cam-cv'), 0, 0);
  S.shots[S.cur] = hc.toDataURL('image/jpeg', 0.9);
  S.cur++; document.getElementById('shot-lbl').textContent = `${S.cur} / 4 SHOTS`;
  if(S.cur === 4) setTimeout(() => goTo(4), 500);
}

function reshot() { S.cur = 0; S.shots = [null,null,null,null]; document.getElementById('shot-lbl').textContent = `READY`; goTo(3); }

/* 최종 필름: 각진 스타일 복구 */
async function buildResult() {
  const wrap = document.getElementById('result-wrap'); wrap.innerHTML = '';
  const themes = [{bg:'#ffffff', text:'#7fb3ff'}, {bg:'#7fb3ff', text:'#ffffff'}, {bg:'#222222', text:'#ffffff'}];
  for(let t of themes) {
    const canvas = document.createElement('canvas'); const ctx = canvas.getContext('2d');
    const FW = 400, PAD = 20, GAP = 12; // 각진 느낌을 위해 패딩 조절
    if(S.mode === 'v') {
      const SW = FW - (PAD * 2), SH = SW / S.camRatio;
      canvas.width = FW; canvas.height = (PAD * 2) + (SH * 4) + (GAP * 3) + 80;
      ctx.fillStyle = t.bg; ctx.fillRect(0, 0, canvas.width, canvas.height);
      for(let i=0; i<4; i++) { const img = await loadImg(S.shots[i]); ctx.drawImage(img, PAD, PAD + (i * (SH + GAP)), SW, SH); }
    } else {
      const SW = (FW - (PAD * 2) - GAP) / 2, SH = SW / S.camRatio;
      canvas.width = FW; canvas.height = (PAD * 2) + (SH * 2) + GAP + 80;
      ctx.fillStyle = t.bg; ctx.fillRect(0, 0, canvas.width, canvas.height);
      for(let i=0; i<4; i++) { const img = await loadImg(S.shots[i]); const dx = PAD + (i % 2) * (SW + GAP), dy = PAD + Math.floor(i / 2) * (SH + GAP); ctx.drawImage(img, dx, dy, SW, SH); }
    }
    ctx.fillStyle = t.text; ctx.font = '700 22px Gaegu'; ctx.textAlign = 'center'; ctx.fillText('SOFT BOOTH 4', FW/2, canvas.height - 30);
    const dataUrl = canvas.toDataURL('image/jpeg', 0.9);
    const div = document.createElement('div');
    div.innerHTML = `<img src="${dataUrl}" style="width:130px; border: 1px solid #eee; cursor:pointer;">`;
    div.onclick = () => { S.picked_data = dataUrl; document.getElementById('btn-dl').disabled = false; alert("필름이 선택되었습니다!"); };
    wrap.appendChild(div);
  }
}
function loadImg(src) { return new Promise(res => { const i = new Image(); i.onload = () => res(i); i.src = src; }); }
